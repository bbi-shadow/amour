name: amour
description: Amour — Modern Dating App built with Flutter & Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Firebase ──────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # ── Authentication & Networking ───────────────
  google_sign_in: ^6.2.1
  dio: ^5.4.3+1
  http: ^1.2.1
  url_launcher: ^6.3.0

  # ── State Management ──────────────────────────
  get: ^4.6.6

  # ── UI & Media ────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_card_swiper: ^6.1.0
  confetti: ^0.7.0

  # ── Utilities & Services ──────────────────────
  intl: ^0.20.2
  uuid: ^4.4.0
  path_provider: ^2.1.3
  sqflite: ^2.3.3+1
  permission_handler: ^11.3.1
  agora_rtc_engine: ^6.3.2
  flutter_local_notifications: ^17.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/image/logo.png"
  adaptive_icon_background: "#FF4B6E"
  adaptive_icon_foreground: "assets/image/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/image/logo.png
